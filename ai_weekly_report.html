<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 健康報告</title>
    <style>
        :root {
            --bg-color: #f4efe6;
            --card-bg: #fffdf9;
            --text-color: #3f372d;
            --text-muted: #6f665a;
            --border-color: #d8cfbf;
            --theme-color: #A45A3F;
            --theme-light: rgba(164, 90, 63, 0.12);
        }
        :root[data-theme="dark"] {
            --bg-color: #1e1a17;
            --card-bg: #2a241f;
            --text-color: #f4e9dc;
            --text-muted: #cdbca9;
            --border-color: #5a4d40;
            --theme-light: rgba(228, 188, 160, 0.16);
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
        }
        .page {
            max-width: 960px;
            margin: 0 auto;
            padding: 18px;
            box-sizing: border-box;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            margin-bottom: 14px;
        }
        .title-wrap {
            margin-left: auto;
            text-align: right;
        }
        .back-btn {
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
        }
        .title-wrap h1 {
            margin: 0;
            color: var(--theme-color);
            font-size: 1.5rem;
        }
        .subtitle {
            margin-top: 4px;
            color: var(--text-muted);
            font-size: 0.95rem;
            text-align: right;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            margin-top: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        .card h2 {
            margin: 0 0 10px;
            font-size: 1.1rem;
            color: var(--theme-color);
        }
        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .input {
            flex: 1;
            min-width: 260px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: #fff;
            color: var(--text-color);
            box-sizing: border-box;
        }
        .btn {
            border: 1px solid var(--theme-color);
            background: var(--theme-light);
            color: var(--theme-color);
            font-weight: 800;
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
        }
        .btn.primary {
            background: var(--theme-color);
            color: #fff;
        }
        .hint {
            margin: 8px 0 0;
            color: var(--text-muted);
            font-size: 0.88rem;
        }
        .status {
            margin: 0 0 8px;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 700;
        }
        .status:empty {
            display: none;
        }
        .report {
            background: #fff;
            border: 1px dashed var(--border-color);
            border-radius: 10px;
            padding: 14px;
            white-space: pre-wrap;
            line-height: 1.55;
            min-height: 220px;
        }
        .date-input {
            max-width: 220px;
            min-width: 160px;
        }
        .disclaimer {
            margin-top: 14px;
            background: #f7ebe7;
            color: #8B3A2E;
            border: 1px solid #e5c4ba;
            border-radius: 10px;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 700;
        }
        .email-status {
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
        }
        .email-status.success {
            color: #2f7c47;
        }
        .email-status.error {
            color: #a23d2a;
        }
        .book-subtitle {
            margin: 4px 0 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .books-reveal {
            opacity: 0;
            transform: translateY(10px);
            max-height: 0;
            overflow: hidden;
            pointer-events: none;
            transition: opacity 0.45s ease, transform 0.45s ease, max-height 0.45s ease;
        }
        .books-reveal.visible {
            opacity: 1;
            transform: translateY(0);
            max-height: 1200px;
            pointer-events: auto;
        }
        .books-prep {
            margin-top: 12px;
            color: var(--theme-color);
            font-size: 0.92rem;
            font-weight: 700;
        }
        .book-headline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px 12px;
            flex-wrap: wrap;
            margin: 4px 0 6px;
        }
        .book-refresh-link {
            border: 0;
            background: transparent;
            color: var(--theme-color);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
        }
        .book-refresh-link[disabled] {
            opacity: 0.5;
            cursor: default;
        }
        .book-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
            margin-top: 6px;
        }
        .book-item {
            display: flex;
            gap: 8px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 6px;
            background: #fff;
            min-height: 74px;
        }
        .book-cover {
            width: 44px;
            height: 60px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            object-fit: cover;
            background: #f4efe6;
            flex-shrink: 0;
        }
        .book-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }
        .book-rank {
            color: var(--theme-color);
            font-weight: 800;
            font-size: 0.75rem;
        }
        .book-link {
            color: #8B3A2E;
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 700;
            line-height: 1.25;
            word-break: break-word;
        }
        .book-link:hover {
            text-decoration: underline;
        }
        .book-empty {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 2px 0 0;
        }
        :root[data-theme="dark"] .back-btn,
        :root[data-theme="dark"] .input,
        :root[data-theme="dark"] .report,
        :root[data-theme="dark"] .book-item {
            color: var(--text-color);
            background: #241f1b;
        }
        :root[data-theme="dark"] .book-link {
            color: #ffd9bf;
        }
        :root[data-theme="dark"] .disclaimer {
            background: #4a2f2a;
            color: #ffe0d8;
            border-color: #855d56;
        }
        :root[data-theme="dark"] .status,
        :root[data-theme="dark"] .subtitle,
        :root[data-theme="dark"] .book-subtitle,
        :root[data-theme="dark"] .email-status {
            color: var(--text-muted);
        }
        @media (max-width: 850px) {
            .title-wrap h1 { font-size: 1.25rem; }
            .input { min-width: 100%; }
            .date-input { max-width: none; }
            .btn { width: 100%; }
            .topbar { align-items: flex-start; flex-direction: column; }
            .title-wrap {
                width: 100%;
                margin-left: 0;
                text-align: right;
            }
            .book-headline {
                align-items: flex-start;
            }
            .book-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .book-grid .book-item:nth-child(n + 3) {
                display: none;
            }
        }
        @media (max-width: 560px) {
            .book-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>

</head>

    </div>

    <div id="books-reveal" class="books-reveal" aria-hidden="true">
        <div id="books-prep-text" class="books-prep">AI報告準備中，等待期間為你推介...</div>
        <div class="card" id="books-card">
            <h2 id="books-title">誠品親子熱賣書推薦</h2>
            <div class="book-headline">
                <div id="books-subtitle" class="book-subtitle">每次更新會顯示週榜上的其他書籍</div>
                <button id="books-refresh-btn" class="book-refresh-link" onclick="refreshBestsellers()">更新書單</button>
            </div>
            <div id="books-status" class="status">載入中...</div>
            <div id="books-list" class="book-grid"></div>
        </div>
    </div>

    <div class="card">
        <h2 id="result-title">AI 分析結果</h2>
        <div id="status" class="status">等待資料中...</div>
        <div id="report" class="report">尚未生成報告。</div>
    </div>
    </div>

    <div class="card">
        <h2 id="email-title">發送報告到電郵</h2>
        <div class="row">
            <input id="email-input" type="email" class="input" placeholder="請輸入收件電郵">
            <button id="send-email-btn" class="btn" onclick="sendReportEmail()">發送報告</button>
        </div>
        <div id="email-status" class="email-status">先生成 AI 報告，再發送電郵。</div>
    </div>

</div>

let currentLang = (() => {
    const langFromQuery = (qs.get('lang') || '').toLowerCase();
    if (langFromQuery === 'en' || langFromQuery.startsWith('en-')) return 'en';
    if (langFromQuery === 'zh' || langFromQuery.startsWith('zh-')) return 'zh';
    const saved = (localStorage.getItem('appLang') || 'zh').toLowerCase();
    return (saved === 'en' || saved.startsWith('en-')) ? 'en' : 'zh';
})();
let currentTheme = (() => {
    const queryTheme = (qs.get('theme') || '').toLowerCase();
    if (queryTheme === 'dark' || queryTheme === 'light') return queryTheme;
    const htmlTheme = (document.documentElement.getAttribute('data-theme') || '').toLowerCase();
    if (htmlTheme === 'dark' || htmlTheme === 'light') return htmlTheme;
    const savedTheme = (localStorage.getItem('appTheme') || '').toLowerCase();
    if (savedTheme === 'dark' || savedTheme === 'light') return savedTheme;
    const h = new Date().getHours();
    return (h >= 18 || h < 6) ? 'dark' : 'light';
})();

function t(key, ...args) {
    const value = uiText[currentLang][key];
    if (typeof value === 'function') return value(...args);
    return value;
}

function applyThemeMode(theme) {
    currentTheme = theme === 'dark' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    try {
        localStorage.setItem('appTheme', currentTheme);
    } catch (_) {}
}

let latestSummary = null;
let lastFetchedCount = 0;
let latestGeneratedReport = '';
let bestsellerPayload = null;
let bestsellerError = '';
let booksLoading = false;
let booksRevealed = false;

function toggleLanguage() {
    currentLang = currentLang === 'zh' ? 'en' : 'zh';
    localStorage.setItem('appLang', currentLang);
    applyLanguage();
    onDateRangeChange();
}

function applyLanguage() {
    document.documentElement.lang = currentLang === 'zh' ? 'zh-HK' : 'en';
    document.title = currentLang === 'zh' ? 'AI 健康報告' : 'AI Health Report';
    document.getElementById('back-btn').innerText = t('backBtn');
    document.getElementById('page-title').innerText = t('pageTitle', babyName);
    document.getElementById('generate-title').innerText = t('generateTitle');
    document.getElementById('to-label').innerText = t('toLabel');
    document.getElementById('books-title').innerText = t('booksTitle');
    document.getElementById('books-prep-text').innerText = t('booksPrep');
    document.getElementById('books-subtitle').innerText = t('booksSubtitle');
    document.getElementById('result-title').innerText = t('resultTitle');
    document.getElementById('disclaimer-text').innerText = t('disclaimer');
    document.getElementById('lang-toggle-btn').innerText = t('langToggle');
    document.getElementById('email-title').innerText = t('emailTitle');
    document.getElementById('email-input').placeholder = t('emailPlaceholder');

    const statusEl = document.getElementById('status');
    const reportEl = document.getElementById('report');
    const periodEl = document.getElementById('period-text');
    const emailStatusEl = document.getElementById('email-status');
    const generateBtn = document.getElementById('generate-btn');
    const sendEmailBtn = document.getElementById('send-email-btn');
    const booksRefreshBtn = document.getElementById('books-refresh-btn');
    if (generateBtn && !generateBtn.disabled) {
        generateBtn.innerText = t('generateBtn');
    }
    if (sendEmailBtn && !sendEmailBtn.disabled) {
        sendEmailBtn.innerText = t('emailBtn');
    }
    if (booksRefreshBtn) {
        booksRefreshBtn.innerText = booksLoading ? t('booksRefreshBtnLoading') : t('booksRefreshBtn');
        booksRefreshBtn.disabled = booksLoading;
    }

    if (!periodEl.innerText.trim()) {
        periodEl.innerText = t('periodDefault');
    }

    const statusPlaceholders = [
        uiText.zh.statusWaiting, uiText.en.statusWaiting,
        uiText.zh.statusNeedLogin, uiText.en.statusNeedLogin,
        uiText.zh.statusReady, uiText.en.statusReady
    ];
    if (statusPlaceholders.includes(statusEl.innerText.trim())) {
        statusEl.innerText = auth.currentUser ? t('statusReady') : t('statusNeedLogin');
    }

    const reportPlaceholders = [uiText.zh.reportPlaceholder, uiText.en.reportPlaceholder];
    if (reportPlaceholders.includes(reportEl.innerText.trim())) {
        reportEl.innerText = t('reportPlaceholder');
    }

    const emailText = emailStatusEl.innerText.trim();
    if ([uiText.zh.emailHint, uiText.en.emailHint].includes(emailText)) {
        emailStatusEl.innerText = t('emailHint');
    } else if ([uiText.zh.emailSuccess, uiText.en.emailSuccess].includes(emailText)) {
        emailStatusEl.innerText = t('emailSuccess');

function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

function formatDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

function toJsDate(input) {
    if (!input) return null;
    if (input instanceof Date) return input;
    if (typeof input.toDate === 'function') return input.toDate();
    const d = new Date(input);
    return Number.isNaN(d.getTime()) ? null : d;
}

function getApiCandidates(path) {
    const qs = new URLSearchParams(window.location.search);
    const queryBase = (qs.get('apiBase') || '').trim();
    const globalBase = (window.BABY_AI_API_BASE || '').trim();
    const configuredBase = queryBase || globalBase;

    const normalize = (base, p) => `${base.replace(/\/+$/, '')}${p}`;
    const localUrl = `http://localhost:8787${path}`;

    // For hosted static pages (e.g. GitHub Pages), always prefer configured backend URL.
    if (configuredBase) {
        return [normalize(configuredBase, path)];
    }

    if (window.location.protocol === 'file:') {
        return [localUrl];
    }

    const candidates = [path];
    // Only try localhost fallback on http pages to avoid browser mixed-content blocking on https.
    if (window.location.protocol === 'http:' && window.location.origin !== 'http://localhost:8787') {
        candidates.push(localUrl);
    }
    return Array.from(new Set(candidates));
}

function clearChildren(el) {
    while (el && el.firstChild) {
        el.removeChild(el.firstChild);
    }
}

function renderBookList(containerEl, books) {
    clearChildren(containerEl);
    const fallbackCover = 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"64\" height=\"88\"><rect width=\"64\" height=\"88\" fill=\"#f4efe6\"/></svg>');

    if (!Array.isArray(books) || books.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'book-empty';
        empty.innerText = t('booksEmpty');
        containerEl.appendChild(empty);
        return;
    }

    books.forEach((book, index) => {
        const item = document.createElement('div');
        item.className = 'book-item';

        const img = document.createElement('img');
        img.className = 'book-cover';
        img.loading = 'lazy';
        img.src = book.imageUrl || fallbackCover;
        img.alt = book.title || `book-${index + 1}`;
        item.appendChild(img);

        const meta = document.createElement('div');
        meta.className = 'book-meta';

        const rank = document.createElement('div');
        rank.className = 'book-rank';
        rank.innerText = `#${book.rank || index + 1}`;
        meta.appendChild(rank);

        const link = document.createElement('a');
        link.className = 'book-link';
        link.href = book.productUrl || '#';
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.innerText = book.title || '';
        meta.appendChild(link);

        item.appendChild(meta);
        containerEl.appendChild(item);
    });
}

function renderBestsellerCard() {
    const subtitleEl = document.getElementById('books-subtitle');
    const statusEl = document.getElementById('books-status');
    const booksListEl = document.getElementById('books-list');
    const refreshBtn = document.getElementById('books-refresh-btn');

    if (refreshBtn) {
        refreshBtn.innerText = booksLoading ? t('booksRefreshBtnLoading') : t('booksRefreshBtn');

    }

    if (bestsellerError) {
        clearChildren(booksListEl);
        subtitleEl.innerText = t('booksSubtitle');
        statusEl.innerText = t('booksStatusError', bestsellerError);
        return;
    }

    if (!bestsellerPayload) {
        clearChildren(booksListEl);
        subtitleEl.innerText = t('booksSubtitle');
        statusEl.innerText = t('booksStatusLoading');
        return;
    }

    const books = Array.isArray(bestsellerPayload.books) ? bestsellerPayload.books : [];
    subtitleEl.innerText = t('booksSubtitle');
    statusEl.innerText = booksLoading ? t('booksStatusLoading') : t('booksStatusLoaded');

    renderBookList(booksListEl, books);
}

async function requestBestsellers(forceRefresh = false) {
    const seed = Date.now() + Math.floor(Math.random() * 100000);
    const query = forceRefresh ? `?refresh=1&seed=${seed}` : `?seed=${seed}`;
    const path = `/api/eslite-bestsellers${query}`;
    const urls = getApiCandidates(path);
    let lastError = null;

    for (let i = 0; i < urls.length; i++) {
        const url = urls[i];
        const isLast = i === urls.length - 1;
        try {
            const resp = await fetch(url, { method: 'GET' });
            if (resp.ok) return await resp.json();

            const rawBody = await resp.text();
            let errMsg = rawBody;
            try {
                const errJson = JSON.parse(rawBody);
                errMsg = errJson.error || rawBody;
            } catch (_) {}

            const contentType = (resp.headers.get('content-type') || '').toLowerCase();
            const isRouteMismatch = resp.status === 404 || resp.status === 405 || contentType.includes('text/html');
            if (isRouteMismatch && !isLast) {
                lastError = new Error(t('errorApiRouteMismatch', url, resp.status));
                continue;
            }

            lastError = new Error(t('errorApiServer', resp.status, errMsg));
            throw lastError;
        } catch (error) {
            if (lastError && error === lastError) throw lastError;
            const baseMsg = error && error.message ? error.message : String(error);
            lastError = new Error(t('errorConnect', url, baseMsg));
            if (!isLast) continue;
            throw lastError;
        }
    }

    throw lastError || new Error(t('booksStatusLoading'));
}

async function refreshBestsellers() {
    await loadBestsellers(true);
}

function revealBooksSection() {
    const booksRevealEl = document.getElementById('books-reveal');
    if (!booksRevealEl) return;

    booksRevealEl.classList.add('visible');
    booksRevealEl.setAttribute('aria-hidden', 'false');
    booksRevealed = true;

    if (!bestsellerPayload && !booksLoading) {
        loadBestsellers();
    }
}

async function loadBestsellers(forceRefresh = false) {
    booksLoading = true;
    bestsellerError = '';
    renderBestsellerCard();

    try {
        const data = await requestBestsellers(forceRefresh);
        bestsellerPayload = data;
        renderBestsellerCard();
    } catch (error) {
        bestsellerError = error && error.message ? error.message : String(error);
        renderBestsellerCard();
    } finally {
        booksLoading = false;
        renderBestsellerCard();
    }
}

function toDateInputValue(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

function parseDateInput(value, isEndOfDay) {
    if (!value) return null;
    const parts = value.split('-').map(Number);
    if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
    const [y, m, d] = parts;
    if (isEndOfDay) return new Date(y, m - 1, d, 23, 59, 59, 999);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
}

function initDefaultDateRange() {
    const end = new Date();
    const start = new Date();
    start.setDate(end.getDate() - 6);
    document.getElementById('start-date').value = toDateInputValue(start);
    document.getElementById('end-date').value = toDateInputValue(end);
}

function getSelectedRange() {
    const startVal = document.getElementById('start-date').value;
    const endVal = document.getElementById('end-date').value;
    const startDate = parseDateInput(startVal, false);
    const endDate = parseDateInput(endVal, true);

    if (!startDate || !endDate) throw new Error(t('errorSelectDate'));
    if (startDate > endDate) throw new Error(t('errorDateOrder'));
    return { startDate, endDate };
}

function onDateRangeChange() {
    try {
        const { startDate, endDate } = getSelectedRange();
        document.getElementById('period-text').innerText = t('periodRange', formatDate(startDate), formatDate(endDate));
    } catch (_) {}
}

async function loadRecordsInRange(userId, startDate, endDate) {
    const snapshot = await db.collection('baby_records')
        .where('userId', '==', userId)
        .where('babyId', '==', babyId)
        .get();

    const records = [];
    snapshot.forEach((doc) => {
        const data = doc.data();
        const time = toJsDate(data.recordTime);
        if (!time) return;
        if (time < startDate || time > endDate) return;
        records.push({ ...data, time });
    });

    records.sort((a, b) => a.time - b.time);
    return { records, from: startDate, to: endDate };
}

function summarizeRecords(records) {
    const summary = {
        feeding: { formulaMl: 0, breastmilkMl: 0, directMins: 0, pumpMl: 0, totalCount: 0 },
        diaper: { total: 0, pee: 0, poo: 0, rashMax: 0 },
        sleep: { totalMins: 0, sessions: 0 },
        temp: { max: null, min: null, feverCount: 0 },
        bath: { count: 0 },
        tummy: { totalMins: 0, sessions: 0 },
        growth: { latestHeight: null, latestWeight: null, latestHeadCircumference: null, firstWeight: null, lastWeight: null, firstHeadCircumference: null, lastHeadCircumference: null }
    };

    const growthWeights = [];
    const growthHeads = [];

    for (const r of records) {
        if (r.category === 'feeding') {
            summary.feeding.totalCount += 1;
            if (r.feedingType === 'formula') summary.feeding.formulaMl += Number(r.volumeML) || 0;
            if (r.feedingType === 'breastmilk') summary.feeding.breastmilkMl += Number(r.volumeML) || 0;
            if (r.feedingType === 'direct') {
                let left = Number(r.directLeft) || 0;
                let right = Number(r.directRight) || 0;
                if (!left && !right && r.durationMins) left = Number(r.durationMins) || 0;
                summary.feeding.directMins += left + right;
            }
            if (r.feedingType === 'pump') {
                let left = Number(r.pumpLeft) || 0;
                let right = Number(r.pumpRight) || 0;
                if (!left && !right && r.volumeML) left = Number(r.volumeML) || 0;
                summary.feeding.pumpMl += left + right;
            }
        }

        if (r.category === 'diaper') {
            summary.diaper.total += 1;
            if (r.hasPee) summary.diaper.pee += 1;
            if (r.hasPoo) summary.diaper.poo += 1;
            summary.diaper.rashMax = Math.max(summary.diaper.rashMax, Number(r.rash) || 0);
        }

        if (r.category === 'sleep' && r.durationMins) {
            summary.sleep.totalMins += Number(r.durationMins) || 0;
            summary.sleep.sessions += 1;
        }

        if (r.category === 'temp' && r.temp != null) {
            const t = Number(r.temp);
            if (!Number.isNaN(t)) {
                summary.temp.max = summary.temp.max == null ? t : Math.max(summary.temp.max, t);
                summary.temp.min = summary.temp.min == null ? t : Math.min(summary.temp.min, t);
                if (t >= 38) summary.temp.feverCount += 1;
            }
        }

        if (r.category === 'bath') summary.bath.count += 1;

        if (r.category === 'tummy' && r.durationMins) {
            summary.tummy.totalMins += Number(r.durationMins) || 0;
            summary.tummy.sessions += 1;
        }

        if (r.category === 'growth') {
            if (r.height != null) summary.growth.latestHeight = Number(r.height) || summary.growth.latestHeight;
            if (r.weight != null) {
                const w = Number(r.weight);
                if (!Number.isNaN(w)) {
                    summary.growth.latestWeight = w;
                    growthWeights.push({ time: r.time, weight: w });
                }
            }
            if (r.headCircumference != null) {
                const h = Number(r.headCircumference);
                if (!Number.isNaN(h)) {
                    summary.growth.latestHeadCircumference = h;
                    growthHeads.push({ time: r.time, headCircumference: h });
                }
            }
        }
    }

    growthWeights.sort((a, b) => a.time - b.time);
    if (growthWeights.length > 0) {
        summary.growth.firstWeight = growthWeights[0].weight;
        summary.growth.lastWeight = growthWeights[growthWeights.length - 1].weight;
    }

    growthHeads.sort((a, b) => a.time - b.time);
    if (growthHeads.length > 0) {
        summary.growth.firstHeadCircumference = growthHeads[0].headCircumference;
        summary.growth.lastHeadCircumference = growthHeads[growthHeads.length - 1].headCircumference;
    }

    return summary;
}

function buildPrompt(summary, from, to, recordsCount) {
    if (currentLang === 'en') {
        return `You are a pediatric health assistant. Based on the following summary, provide family care analysis for the selected period.

Baby name: ${babyName}
Period: ${formatDate(from)} to ${formatDate(to)}
Record count: ${recordsCount}

Summary (JSON):
${JSON.stringify(summary, null, 2)}

Please structure the report with:
1) Overall health assessment for this period
2) Growth trend interpretation (explicitly state if data is insufficient)
3) Key observations on feeding, diaper, sleep, temperature, and tummy time
4) Risk signals parents should watch (high to low priority)
5) Practical next-step care suggestions (bullet list)
6) When to seek medical help promptly
7) Final paragraph must include exactly:
This AI report is for reference only, not a professional medical report. If you have questions, please consult your family doctor.

Requirements:
- Do not make any diagnosis.
- If data is insufficient, clearly list missing data and what to track next.
- Use language that parents can easily understand.
- Use a gentle, supportive, reassuring tone: affirm parents' efforts first, then give suggestions.
- For risks or gaps, use gentle reminders and avoid blame or fear-inducing wording.`;
    }

    return `請用繁體中文（香港用語）撰寫。
你是一位兒科健康助理，請根據以下指定期間摘要提供家庭照顧分析。

寶寶名稱：${babyName}
分析期間：${formatDate(from)} 至 ${formatDate(to)}
紀錄總數：${recordsCount}

資料摘要（JSON）：
${JSON.stringify(summary, null, 2)}

請輸出以下段落：
1) 該期間整體健康評估
2) 成長趨勢判讀（如資料不足要明確指出）
3) 飲食、排泄、睡眠、體溫、趴撐的重點觀察
4) 需要家長留意的風險訊號（由高到低）
5) 接下來可執行的照顧建議（條列）
6) 何時應盡快向醫生求助
7) 最後一段必須逐字包含：本AI報告只作參考，不是專業醫學報告，如果疑問，請向家庭醫生查詢

要求：
- 不要作出確診。
- 若資料不足，請明確列出欠缺資料和建議補充紀錄項目。
- 用家長容易理解的語言。
- 整體語氣必須溫柔、支持、安撫，先肯定父母已做的努力，再給建議。
- 提到風險或未做好的部分時，請用「溫柔提醒」語氣，避免責備或製造焦慮。`;
}

async function generateReport() {
    const user = auth.currentUser;
    if (!user) {
        setStatus(t('errorNeedLogin'));
        return;
    }

    const generateBtn = document.getElementById('generate-btn');
    generateBtn.disabled = true;
    generateBtn.innerText = t('generateBtnLoading');
    revealBooksSection();

    try {
        const { startDate, endDate } = getSelectedRange();
        document.getElementById('period-text').innerText = t('periodRange', formatDate(startDate), formatDate(endDate));

        setStatus(t('statusReading'));
        const { records, from, to } = await loadRecordsInRange(user.uid, startDate, endDate);
        lastFetchedCount = records.length;
        latestSummary = summarizeRecords(records);

        if (records.length === 0) {
            latestGeneratedReport = '';
            document.getElementById('report').innerText = t('statusNoData');
            setStatus(t('statusNoData'));
            setEmailStatus(t('errorNeedGeneratedReport'), 'error');
            return;
        }

        setStatus(t('statusGenerating'));
        const prompt = buildPrompt(latestSummary, from, to, records.length);
        const isGitHubPages = window.location.hostname.includes('github.io');
        const hasConfiguredBase = Boolean((window.BABY_AI_API_BASE || '').trim() || (new URLSearchParams(window.location.search).get('apiBase') || '').trim());
        if (isGitHubPages && !hasConfiguredBase) {
            throw new Error(t('errorNeedApiBase'));
        }

        const data = await requestAiReport(prompt, currentLang);
        const reportText = (data.report || '').trim();
        if (!reportText) {
            throw new Error(t('errorNoReportText'));
        }

        document.getElementById('report').innerText = reportText;
        latestGeneratedReport = reportText;
        setStatus(t('statusDone', lastFetchedCount));
        setEmailStatus(t('emailHint'));
    } catch (err) {
        console.error(err);
        setStatus(t('statusFailed'));
        latestGeneratedReport = '';
        document.getElementById('report').innerText = `${t('errorPrefix')}${err.message}`;
        setEmailStatus(t('errorNeedGeneratedReport'), 'error');
    } finally {
        generateBtn.disabled = false;
        generateBtn.innerText = t('generateBtnAgain');
    }
}

async function initPage(user) {
    localStorage.setItem('appLang', currentLang);
    applyThemeMode(currentTheme);
    initDefaultDateRange();
    applyLanguage();
    onDateRangeChange();
    if (!document.getElementById('status').innerText.trim()) {
        setStatus(t('statusWaiting'));
    }
    if (!document.getElementById('report').innerText.trim()) {
        document.getElementById('report').innerText = t('reportPlaceholder');
    }
    if (!document.getElementById('email-status').innerText.trim()) {
        setEmailStatus(t('emailHint'));
    }

    if (!user) {
        setStatus(t('statusNeedLogin'));
        return;
    }

    setStatus(t('statusReady'));
}

auth.onAuthStateChanged((user) => {
    initPage(user);
});

window.addEventListener('storage', (event) => {
    if (event.key !== 'appTheme') return;
    const nextTheme = (event.newValue || '').toLowerCase();
    if (nextTheme === 'dark' || nextTheme === 'light') {
        applyThemeMode(nextTheme);
    }
});

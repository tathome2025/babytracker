<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baby Tracker 嬰幼兒生活紀錄</title>
    <style>
        :root {
            --bg-color: #f4f7f6; --sidebar-bg: #ffffff; --card-bg: #ffffff; --text-color: #333333;
            --text-muted: #666666; --border-color: #e0e0e0; --btn-bg: #f9f9f9; --theme-color: #2196F3; 
            --theme-light: rgba(33, 150, 243, 0.1); --red-packet-bg: #fff5f5; --red-packet-border: #ffcccc; --red-packet-text: #d32f2f;
        }
        [data-theme="dark"] {
            --bg-color: #121212; --sidebar-bg: #1e1e1e; --card-bg: #242424; --text-color: #e0e0e0;
            --text-muted: #aaaaaa; --border-color: #444444; --btn-bg: #2c2c2c; --red-packet-bg: #3b1a1a; --red-packet-border: #5c2b2b; --red-packet-text: #ff8a8a;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; height: 100dvh; overflow: hidden; transition: 0.3s; }
        
        #auth-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--bg-color); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .auth-card { background: var(--card-bg); padding: 30px 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 6px solid var(--theme-color); }
        .auth-title { font-size: 1.6rem; font-weight: bold; margin-bottom: 15px; color: var(--text-color); }
        .auth-input { width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 10px; font-size: 1rem; box-sizing: border-box; background: var(--btn-bg); color: var(--text-color); margin-bottom: 12px; }
        .auth-btn { width: 100%; padding: 12px; background: var(--theme-color); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 12px; transition: 0.2s; box-shadow: 0 4px 10px var(--theme-light); }
        .auth-btn.outline { background: transparent; color: var(--theme-color); border: 2px solid var(--theme-color); box-shadow: none; }
        .auth-btn.google { background: #ffffff; color: #444; border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 0; }
        .auth-divider { margin: 15px 0; color: var(--text-muted); font-size: 0.9rem; display: flex; align-items: center; }
        .auth-divider::before, .auth-divider::after { content: ""; flex: 1; height: 1px; background: var(--border-color); margin: 0 10px; }
        .auth-error { color: #d32f2f; font-size: 0.9rem; margin-bottom: 10px; min-height: 20px; }

        .mobile-header { display: none; background-color: var(--sidebar-bg); padding: 10px 15px; border-bottom: 1px solid var(--border-color); align-items: center; justify-content: space-between; z-index: 100; position: sticky; top: 0; }
        .hamburger-btn { background: none; border: none; font-size: 1.6rem; color: var(--text-color); cursor: pointer; padding: 0; }
        .sidebar { width: 240px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; transition: transform 0.3s ease; z-index: 1000; overflow-y: auto; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; opacity: 0; transition: opacity 0.3s; }
        .app-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; text-align: center; color: var(--text-color); }
        .user-info { text-align: center; margin-bottom: 15px; font-size: 0.85rem; color: var(--text-muted); word-break: break-all; }
        .nav-btn { padding: 12px 15px; border: 2px solid transparent; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; background: var(--btn-bg); color: var(--text-muted); margin-bottom: 8px; text-align: left; transition: 0.2s; }
        .nav-btn.active { background: var(--theme-light); color: var(--theme-color); border-color: var(--theme-color); }
        .sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; gap: 8px; padding-top: 20px; }
        .action-btn { padding: 12px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--btn-bg); color: var(--text-color); font-size: 1rem; cursor: pointer; font-weight: bold; text-align: center; }
        .logout-btn { color: #d32f2f; border-color: #ffcccc; background: #fff5f5; }

        .main-content { flex: 1; padding: 15px 20px 40px; box-sizing: border-box; display: flex; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .baby-selector { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; flex-shrink: 0; }
        .baby-selector::-webkit-scrollbar { display: none; }
        .baby-tab { padding: 8px 18px; border-radius: 15px; background: var(--btn-bg); color: var(--text-muted); font-size: 1.1rem; font-weight: bold; cursor: pointer; border: 2px solid var(--border-color); white-space: nowrap; transition: 0.2s; }
        .baby-tab.active { background: var(--theme-color); color: white; border-color: var(--theme-color); box-shadow: 0 4px 10px var(--theme-light); }
        
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 5px solid var(--theme-color); transition: 0.3s; flex: 1; flex-direction: column; display: none; margin-bottom: 20px; }
        .card.active { display: flex; }
        
        h2 { font-size: 1.4rem; margin-top: 0; margin-bottom: 15px; border-bottom: 2px solid var(--border-color); padding-bottom: 12px; color: var(--text-color); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        
        .time-wrapper { display: flex; align-items: center; gap: 8px; }
        .time-label { font-size: 1rem; font-weight: bold; color: var(--text-muted); }
        .time-display { 
            color: var(--theme-color); 
            font-size: 1.8rem; 
            font-weight: 900; 
            font-variant-numeric: tabular-nums; 
            background: var(--theme-light); 
            padding: 4px 14px; 
            border-radius: 12px; 
            border: 2px solid var(--theme-color); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }

        .section { margin-bottom: 15px; } 
        .label { font-size: 1rem; font-weight: bold; margin-bottom: 6px; display: block; color: var(--text-muted); }
        .row { display: flex; gap: 20px; width: 100%; }
        .col { flex: 1; }
        .split-divider { border-right: 2px dashed var(--border-color); padding-right: 20px; }
        
        .btn-group { display: grid; gap: 8px; }
        .btn { padding: 10px 5px; border: 2px solid var(--border-color); border-radius: 10px; background: var(--btn-bg); cursor: pointer; font-size: 1rem; font-weight: bold; color: var(--text-color); transition: 0.2s; text-align: center; }
        .btn.active { background: var(--theme-color); color: white; border-color: var(--theme-color); box-shadow: 0 2px 8px var(--theme-light); }
        .btn-small { padding: 5px; font-size: 0.9rem; flex: 1; }
        
        .input-text, .input-number, .input-date, .input-select { width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 10px; font-size: 1rem; box-sizing: border-box; background: var(--btn-bg); color: var(--text-color); }
        .hidden { display: none !important; }
        .submit-btn { width: 100%; padding: 15px; background: var(--theme-color); color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px var(--theme-light); transition: 0.2s; }
        .submit-btn:disabled { background: var(--border-color); cursor: not-allowed; box-shadow: none; }

        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .modal.active { display: flex; opacity: 1; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 15px; width: 90%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transform: translateY(-20px); transition: transform 0.3s; }
        .modal.active .modal-content { transform: translateY(0); }

        /* 🔥 更新 summary-grid 以容納 4 個方塊 */
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .summary-box { background: var(--btn-bg); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid var(--border-color); }
        .summary-title { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        .summary-value { font-size: 1.3rem; font-weight: bold; color: var(--theme-color); }
        .chart-container { position: relative; width: 100%; margin-bottom: 20px; }
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-item { background: var(--btn-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .history-info { display: flex; flex-direction: column; gap: 4px; }
        .history-time { font-weight: bold; color: var(--text-color); font-size: 1.1rem; }
        .history-detail { color: var(--text-muted); font-size: 0.9rem; }
        .delete-btn { background: #fff5f5; color: #d32f2f; border: 1px solid #ffcccc; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        
        .profile-box { background: var(--theme-light); padding: 15px; border-radius: 10px; border: 1px solid var(--border-color); margin-bottom: 20px; }

        @media (max-width: 850px) {
            body { flex-direction: column; height: auto; min-height: 100dvh; overflow: visible; }
            .mobile-header { display: flex; }
            .sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); box-shadow: 4px 0 15px rgba(0,0,0,0.3); }
            .sidebar.open { transform: translateX(0); }
            .main-content { overflow: visible; padding: 15px 15px 60px; }
            .row { flex-direction: column; gap: 12px; }
            .split-divider { border-right: none; padding-right: 0; border-bottom: 2px dashed var(--border-color); padding-bottom: 12px; }
            .btn-group[style] { grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)) !important; }
            /* 🔥 手機版改為 2x2 排列 */
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <div class="auth-title" data-i18n="appTitle">👶 寶寶紀錄</div>
        <div id="auth-error-msg" class="auth-error"></div>
        <input type="email" id="auth-email" class="auth-input" data-i18n-placeholder="emailPlaceholder" placeholder="電子郵件 Email">
        <input type="password" id="auth-password" class="auth-input" data-i18n-placeholder="pwPlaceholder" placeholder="密碼 Password">
        <button class="auth-btn" onclick="loginUser()" data-i18n="btnLogin">Email 登入</button>
        <button class="auth-btn outline" onclick="registerUser()" data-i18n="btnRegister">註冊新帳號</button>
        <div class="auth-divider" data-i18n="orText">或</div>
        <button class="auth-btn google" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" height="20">
            <span data-i18n="btnGoogleLogin">使用 Google 登入</span>
        </button>
    </div>
</div>

<div class="mobile-header">
    <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
    <div class="app-title" style="margin: 0;" data-i18n="appTitle">👶 寶寶紀錄</div>
    <div style="width: 30px;"></div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div class="app-title" id="desktop-title" data-i18n="appTitle">👶 寶寶紀錄</div>
    <div class="user-info" id="user-info"></div> 
    
    <button class="nav-btn active" onclick="switchTab('feeding', this, '#2196F3')" data-i18n="navFeeding">🍼 吃奶</button>
    <button class="nav-btn" onclick="switchTab('diaper', this, '#FF9800')" data-i18n="navDiaper">🧻 尿片</button>
    <button class="nav-btn" onclick="switchTab('sleep', this, '#673AB7')" data-i18n="navSleep">💤 睡眠</button>
    <button class="nav-btn" onclick="switchTab('growth', this, '#00BCD4')" data-i18n="navGrowth">📏 成長紀錄</button>
    <button class="nav-btn" onclick="switchTab('log', this, '#E91E63')" data-i18n="navLog">📅 24h 日誌</button>
    <button class="nav-btn" onclick="switchTab('history', this, '#4CAF50')" data-i18n="navHistory">📊 趨勢圖表</button>
    
    <button class="nav-btn hidden" id="nav-redpacket" onclick="switchTab('redpacket', this, '#F44336')" data-i18n="navRedPacket">🧧 利是紀錄</button>
    
    <div class="sidebar-bottom">
        <button class="action-btn" onclick="exportCSV()" data-i18n="btnExportCSV">📥 匯出完整紀錄</button>
        <button class="action-btn" onclick="openSettingsModal()" data-i18n="btnSettings">⚙️ 設定寶寶名稱</button>
        
        <div style="display: flex; gap: 8px;">
            <button class="action-btn" id="theme-toggle-btn" onclick="toggleTheme()" style="flex: 1; padding: 10px 5px;">☀️ 日/夜</button>
            <button class="action-btn" id="lang-toggle-btn" onclick="toggleLanguage()" style="flex: 1; padding: 10px 5px;">🌐 EN</button>
        </div>

        <button class="action-btn logout-btn" onclick="logoutUser()" data-i18n="btnLogout">🚪 登出</button>
    </div>
</div>

<div class="main-content">
    <div class="baby-selector" id="baby-selector">
        <button class="baby-tab active" id="tab-baby1" onclick="switchBaby('baby1')">👶 大寶</button>
        <button class="baby-tab" id="tab-baby2" onclick="switchBaby('baby2')">👶 二寶</button>
        <button class="baby-tab hidden" id="tab-baby3" onclick="switchBaby('baby3')">👶 三寶</button>
    </div>

    <div id="feeding-card" class="card active">
        <h2>
            <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                <span data-i18n="feedingTitle">🍼 吃奶紀錄</span>
                <div class="time-wrapper">
                    <span class="time-label" data-i18n="currentTime">現在時間：</span>
                    <span id="time-feeding" class="time-display">--:--</span>
                </div>
            </div>
            <button id="mode-btn-feeding" class="btn outline" style="width: auto; padding: 6px 12px; font-size: 0.9rem;" onclick="toggleManualMode('feeding')" data-i18n="btnManualMode">📅 補登過去紀錄</button>
        </h2>
        
        <div class="row section">
            <div class="col split-divider" style="flex: 1.2;">
                <label class="label" data-i18n="labelTimeAdjust">記錄時間微調</label>
                <div id="quick-time-feeding" class="btn-group" style="grid-template-columns: repeat(3, 1fr);">
                    <button class="btn active" onclick="setTime('feeding', 0, this)" data-i18n="now">現在</button>
                    <button class="btn" onclick="setTime('feeding', 10, this)" data-i18n="min10">-10分</button>
                    <button class="btn" onclick="setTime('feeding', 20, this)" data-i18n="min20">-20分</button>
                    <button class="btn" onclick="setTime('feeding', 30, this)" data-i18n="min30">-30分</button>
                    <button class="btn" onclick="setTime('feeding', 45, this)" data-i18n="min45">-45分</button>
                    <button class="btn" onclick="setTime('feeding', 60, this)" data-i18n="min60">-60分</button>
                </div>
                <div id="manual-time-feeding" class="hidden">
                    <input type="datetime-local" id="input-manual-feeding" class="input-date" onchange="setManualTime('feeding', this.value)">
                    <p style="font-size: 0.85rem; color: #E91E63; margin-top: 5px;" data-i18n="manualNotice">* 您正在補登過去的紀錄</p>
                </div>
            </div>
            <div class="col" style="flex: 0.8;">
                <label class="label" data-i18n="labelFeedType">吃奶種類</label>
                <div class="btn-group" id="type-btns" style="grid-template-columns: repeat(2, 1fr);">
                    <button class="btn type-btn active" data-value="formula" onclick="setType('formula', this)" data-i18n="formula">配方奶</button>
                    <button class="btn type-btn" data-value="breastmilk" onclick="setType('breastmilk', this)" data-i18n="breastmilk">人奶(樽)</button>
                    <button class="btn type-btn" data-value="direct" onclick="setType('direct', this)" data-i18n="direct">親餵</button>
                    <button class="btn type-btn" data-value="pump" onclick="setType('pump', this)" data-i18n="pump">泵奶</button>
                </div>
            </div>
        </div>

        <div id="formula-section" class="section">
            <div class="row">
                <div class="col split-divider" style="flex: 0.8;">
                    <label class="label" data-i18n="labelBrand">牌子及型號</label>
                    <input type="text" class="input-text" data-i18n-placeholder="brandPlaceholder" placeholder="例如：Illuma 1段" id="formula-brand">
                    <div id="recent-brand-area" style="margin-top: 8px; display: none;">
                        <label class="label" style="font-size: 0.85rem; margin-bottom: 4px;" data-i18n="labelRecent">最近使用：</label>
                        <div class="btn-group" id="recent-brand-list" style="grid-template-columns: repeat(2, 1fr); gap: 6px;"></div>
                    </div>
                    <input type="number" class="input-number" data-i18n-placeholder="mlPlaceholder" placeholder="或手動輸入 ML" id="formula-volume" style="margin-top: 10px;">
                </div>
                <div class="col" style="flex: 1.2;">
                    <label class="label" data-i18n="labelQuickMl">快速選擇奶量 (ML)</label>
                    <div class="btn-group" style="grid-template-columns: repeat(3, 1fr);">
                        <button class="btn" onclick="document.getElementById('formula-volume').value=30">30</button>
                        <button class="btn" onclick="document.getElementById('formula-volume').value=60">60</button>
                        <button class="btn" onclick="document.getElementById('formula-volume').value=90">90</button>
                        <button class="btn" onclick="document.getElementById('formula-volume').value=120">120</button>
                        <button class="btn" onclick="document.getElementById('formula-volume').value=150">150</button>
                        <button class="btn" onclick="document.getElementById('formula-volume').value=180">180</button>
                        <button class="btn" onclick="document.getElementById('formula-volume').value=210">210</button>
                        <button class="btn" onclick="document.getElementById('formula-volume').value=240">240</button>
                        <button class="btn" onclick="document.getElementById('formula-volume').value=270">270</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="milk-volume-section" class="section hidden">
            <label class="label" data-i18n="labelMl">奶量 (ML)</label>
            <input type="number" class="input-number" data-i18n-placeholder="manualMlPlaceholder" placeholder="請手動輸入 ML 數" id="breastmilk-volume">
        </div>

        <div id="direct-section" class="section hidden">
            <label class="label" data-i18n="labelDuration">親餵時長 (分鐘)</label>
            <div class="row">
                <div class="col split-divider">
                    <div style="font-weight:bold; margin-bottom:5px; color:var(--theme-color);" data-i18n="lblLeft">左胸 (L)</div>
                    <input type="number" class="input-number" id="direct-left" placeholder="分鐘">
                    <div style="display:flex; gap:5px; margin-top:8px;">
                        <button class="btn btn-small" onclick="addVal('direct-left', 5)">+5</button>
                        <button class="btn btn-small" onclick="addVal('direct-left', 10)">+10</button>
                        <button class="btn btn-small" onclick="addVal('direct-left', 15)">+15</button>
                    </div>
                </div>
                <div class="col">
                    <div style="font-weight:bold; margin-bottom:5px; color:var(--theme-color);" data-i18n="lblRight">右胸 (R)</div>
                    <input type="number" class="input-number" id="direct-right" placeholder="分鐘">
                    <div style="display:flex; gap:5px; margin-top:8px;">
                        <button class="btn btn-small" onclick="addVal('direct-right', 5)">+5</button>
                        <button class="btn btn-small" onclick="addVal('direct-right', 10)">+10</button>
                        <button class="btn btn-small" onclick="addVal('direct-right', 15)">+15</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="pump-section" class="section hidden">
            <label class="label" data-i18n="labelPumpVol">泵奶量 (ML)</label>
            <div class="row">
                <div class="col split-divider">
                    <div style="font-weight:bold; margin-bottom:5px; color:var(--theme-color);" data-i18n="lblLeft">左胸 (L)</div>
                    <input type="number" class="input-number" id="pump-left" placeholder="ML">
                    <div style="display:flex; gap:5px; margin-top:8px;">
                        <button class="btn btn-small" onclick="addVal('pump-left', 30)">+30</button>
                        <button class="btn btn-small" onclick="addVal('pump-left', 60)">+60</button>
                    </div>
                </div>
                <div class="col">
                    <div style="font-weight:bold; margin-bottom:5px; color:var(--theme-color);" data-i18n="lblRight">右胸 (R)</div>
                    <input type="number" class="input-number" id="pump-right" placeholder="ML">
                    <div style="display:flex; gap:5px; margin-top:8px;">
                        <button class="btn btn-small" onclick="addVal('pump-right', 30)">+30</button>
                        <button class="btn btn-small" onclick="addVal('pump-right', 60)">+60</button>
                    </div>
                </div>
            </div>
        </div>

        <button class="submit-btn" id="btn-submit-feeding" onclick="submitData('feeding')" data-i18n="saveFeeding">儲存吃奶紀錄</button>
    </div>

    <div id="diaper-card" class="card">
        <h2>
            <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                <span data-i18n="diaperTitle">🧻 換尿片紀錄</span>
                <div class="time-wrapper">
                    <span class="time-label" data-i18n="currentTime">現在時間：</span>

                let data = doc.data();
                babies.baby1 = data.baby1 ? data.baby1 : translations[currentLang].tabBaby1;

                babies.baby3 = data.baby3 ? data.baby3 : translations[currentLang].tabBaby3;
                
                if(data.baby1_profile) babyProfiles.baby1 = data.baby1_profile;
                if(data.baby2_profile) babyProfiles.baby2 = data.baby2_profile;
                if(data.baby3_profile) babyProfiles.baby3 = data.baby3_profile;

    async function fetchRecentBrands() {
        if(!db || !auth.currentUser) return;
        try {
            const snapshot = await db.collection("baby_records").where("userId", "==", auth.currentUser.uid).get();
            let records = []; snapshot.forEach(doc => records.push(doc.data())); records.sort((a, b) => b.createdAt - a.createdAt);
            let recentBrands = new Set();
            for(let data of records) { if (data.category === 'feeding' && data.feedingType === 'formula' && data.brand && data.brand !== '未填寫') recentBrands.add(data.brand); }
            let brandArray = Array.from(recentBrands).slice(0, 2); let list = document.getElementById('recent-brand-list');
            if(brandArray.length > 0) {
                list.innerHTML = '';
                brandArray.forEach(brand => {
                    let btn = document.createElement('button'); btn.className = 'btn'; btn.style.padding = '6px 4px'; btn.style.fontSize = '0.85rem'; btn.innerText = brand;
                    btn.onclick = function() { document.getElementById('formula-brand').value = brand; }; list.appendChild(btn);
                });
                document.getElementById('recent-brand-area').style.display = 'block';
            }
        } catch (error) {}
    }

    async function submitData(category) {
        if(!db) return alert("Please set firebaseConfig"); if(!auth.currentUser) return alert("Please Login!");
        let submitBtn = document.getElementById('btn-submit-' + category); let originalText = submitBtn.innerText; submitBtn.innerText = translations[currentLang].saving; submitBtn.disabled = true;

        let recordTime;
        if (category === 'growth') {
            let dateVal = document.getElementById('growth-date').value;
            if(!dateVal) { submitBtn.innerText = originalText; submitBtn.disabled = false; return alert(currentLang==='zh'?"請選擇日期！":"Please select a date!"); }
            recordTime = new Date(dateVal);
            let now = new Date(); recordTime.setHours(now.getHours(), now.getMinutes(), now.getSeconds());
        } else {
            recordTime = recordTimes[category];
        }

        let dataToSave = { userId: auth.currentUser.uid, babyId: currentBabyId, babyName: babies[currentBabyId], category: category, recordTime: recordTime, createdAt: firebase.firestore.FieldValue.serverTimestamp() };

        if (category === 'feeding') {
            let activeType = document.querySelector('.type-btn.active').getAttribute('data-value'); dataToSave.feedingType = activeType;
            if (activeType === 'formula') {
                let brandInput = document.getElementById('formula-brand').value; dataToSave.brand = brandInput || '未填寫'; dataToSave.volumeML = Number(document.getElementById('formula-volume').value) || 0; if (brandInput) localStorage.setItem('lastFormulaBrand', brandInput);
            } else if (activeType === 'direct') { 
                dataToSave.directLeft = Number(document.getElementById('direct-left').value) || 0;
                dataToSave.directRight = Number(document.getElementById('direct-right').value) || 0;
            } else if (activeType === 'pump') {
                dataToSave.pumpLeft = Number(document.getElementById('pump-left').value) || 0;
                dataToSave.pumpRight = Number(document.getElementById('pump-right').value) || 0;
            } else { 
                dataToSave.volumeML = Number(document.getElementById('breastmilk-volume').value) || 0; 
            }
        } else if (category === 'diaper') {
            dataToSave.hasPee = document.querySelector('.pee-btn').classList.contains('active'); let hasPoo = document.querySelector('.poo-choice.active').getAttribute('data-value') === 'yes'; dataToSave.hasPoo = hasPoo;
            if (hasPoo) {
                let colorBtn = document.querySelector('.poo-color.active'); let amountBtn = document.querySelector('.poo-amount.active'); let pooColorValue = 'none';
                if (colorBtn) { pooColorValue = colorBtn.getAttribute('data-value'); if (pooColorValue === 'other') { let customColor = document.getElementById('poo-color-other').value.trim(); pooColorValue = customColor !== '' ? customColor : 'other'; } }
                dataToSave.pooColor = pooColorValue; dataToSave.pooAmount = amountBtn ? amountBtn.getAttribute('data-value') : 'none'; 
            }
        } else if (category === 'sleep') { 
            dataToSave.sleepStatus = document.querySelector('.sleep-action.active').getAttribute('data-value'); 
        } else if (category === 'growth') {
            dataToSave.height = Number(document.getElementById('growth-height').value) || null;
            dataToSave.weight = Number(document.getElementById('growth-weight').value) || null;
            if(!dataToSave.height && !dataToSave.weight) { submitBtn.innerText = originalText; submitBtn.disabled = false; return alert(currentLang==='zh'?"請至少填寫身高或體重！":"Please enter height or weight!"); }
        }

        try {
            await db.collection("baby_records").add(dataToSave); alert(`${translations[currentLang].alertSuccess} 【${babies[currentBabyId]}】!`);
            document.querySelectorAll('input').forEach(input => { if(input.id !== 'auth-email' && input.id !== 'auth-password' && input.type !== 'date' && input.type !== 'time' && !input.id.startsWith('profile-')) input.value = ''; });
            document.getElementById('poo-color-other').classList.add('hidden'); restoreLastBrand(); fetchRecentBrands();
            
            // 儲存後自動切回即時模式
            if (category !== 'growth') { 
                if(isManualMode[category]) toggleManualMode(category);
                let firstBtn = document.getElementById(category + '-card').querySelector('.btn-group button'); if(firstBtn) setTime(category, 0, firstBtn); 
            }
        } catch (error) { alert(translations[currentLang].alertError + error.message); } finally { submitBtn.innerText = originalText; submitBtn.disabled = false; }
    }

    async function loadDashboardData() {
        if(!db || !auth.currentUser) return;
        const isLogTab = document.getElementById('log-card').classList.contains('active');
        const isHistoryTab = document.getElementById('history-card').classList.contains('active');
        if (!isLogTab && !isHistoryTab) return; 

        const range = parseInt(document.getElementById('stats-range').value) || 7;
        const listDiv = document.getElementById('log-list');
        if(isLogTab) listDiv.innerHTML = '<div style="text-align:center;">Loading...</div>';

        const now = new Date();
        const past24h = new Date(now.getTime() - 24 * 60 * 60 * 1000);

        let labels = [];
        let dailyStats = {};
        for(let i = range - 1; i >= 0; i--) {
            let d = new Date(); d.setDate(d.getDate() - i);
            let k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            labels.push(k.slice(5)); 
            dailyStats[k] = { formula: 0, breastmilk: 0, directLeft: 0, directRight: 0, pumpLeft: 0, pumpRight: 0, diaper: 0, sleepMins: 0, height: null, weight: null };
        }

        try {
            const snapshot = await db.collection("baby_records").where("userId", "==", auth.currentUser.uid).where("babyId", "==", currentBabyId).get();
            let allRecords = [];
            snapshot.forEach(doc => {
                let data = doc.data(); data.id = doc.id;
                data.time = (data.recordTime && data.recordTime.toDate) ? data.recordTime.toDate() : new Date(data.recordTime);
                allRecords.push(data);
            });

            allRecords.sort((a, b) => a.time - b.time);
            
            let lastSleepStart = null;
            let dayTotalFed = 0; let dayTotalPump = 0; let dayDiaperCount = 0; let daySleepMins = 0; 
            let listHtml = '';

            allRecords.forEach(r => {
                let rDate = `${r.time.getFullYear()}-${String(r.time.getMonth()+1).padStart(2,'0')}-${String(r.time.getDate()).padStart(2,'0')}`;
                
                if (r.category === 'sleep') {
                    if (r.sleepStatus === 'start_sleep') {
                        lastSleepStart = r.time;
                    } else if (r.sleepStatus === 'end_sleep' && lastSleepStart) {
                        let diffMins = (r.time - lastSleepStart) / 1000 / 60;
                        if (dailyStats[rDate]) dailyStats[rDate].sleepMins += diffMins;
                        if (r.time >= past24h && r.time <= now) daySleepMins += diffMins;
                        lastSleepStart = null;
                    }
                }
                if (dailyStats[rDate]) {
                    if (r.category === 'feeding') {
                        if (r.feedingType === 'formula') dailyStats[rDate].formula += (r.volumeML || 0);
                        else if (r.feedingType === 'breastmilk') dailyStats[rDate].breastmilk += (r.volumeML || 0);
                        else if (r.feedingType === 'direct') {
                            let l = r.directLeft||0; let r_v = r.directRight||0;
                            if(!l && !r_v && r.durationMins) l = r.durationMins; // 相容舊資料
                            dailyStats[rDate].directLeft += l;
                            dailyStats[rDate].directRight += r_v;
                        }
                        else if (r.feedingType === 'pump') {
                            let l = r.pumpLeft||0; let r_v = r.pumpRight||0;
                            if(!l && !r_v && r.volumeML) l = r.volumeML; // 相容舊資料
                            dailyStats[rDate].pumpLeft += l;
                            dailyStats[rDate].pumpRight += r_v;
                        }
                    }
                    if (r.category === 'diaper') dailyStats[rDate].diaper += 1;
                    if (r.category === 'growth') {
                        if (r.height) dailyStats[rDate].height = r.height;
                        if (r.weight) dailyStats[rDate].weight = r.weight;
                    }
                }

                if (isLogTab && r.time >= past24h && r.time <= now) {
                    let icon = ''; let desc = ''; let h = String(r.time.getHours()).padStart(2,'0'); let m = String(r.time.getMinutes()).padStart(2,'0');
                    let displayDate = `${r.time.getMonth()+1}/${r.time.getDate()}`;
                    
                    if (r.category === 'feeding') {
                        icon = '🍼';
                        let lblL = translations[currentLang].lblL; let lblR = translations[currentLang].lblR;
                        if(r.feedingType === 'direct') { 
                            let l = r.directLeft||0; let r_v = r.directRight||0; if(!l && !r_v && r.durationMins) l = r.durationMins;
                            desc = `${translations[currentLang].lblDirect} (${lblL}:${l}, ${lblR}:${r_v})`; 
                        }
                        else if(r.feedingType === 'pump') { 
                            let l = r.pumpLeft||0; let r_v = r.pumpRight||0; if(!l && !r_v && r.volumeML) l = r.volumeML;
                            desc = `${translations[currentLang].lblPump} (${lblL}:${l}, ${lblR}:${r_v})`; 
                            dayTotalPump += (l + r_v);
                        }
                        else { 
                            desc = `${r.feedingType==='formula'?translations[currentLang].lblFormula:translations[currentLang].lblBreast} ${r.volumeML}ml`; 
                            if(r.brand && r.brand !== '未填寫') desc += ` [${r.brand}]`; 
                            dayTotalFed += r.volumeML; 
                        }
                    } 
                    else if (r.category === 'diaper') {
                        icon = '🧻'; dayDiaperCount++; let arr = [];
                        let txtPee = currentLang==='zh'?"小便":"Pee"; let txtPoo = currentLang==='zh'?"大便":"Poo"; let txtNoPoo = currentLang==='zh'?"沒大便":"No Poo";
                        if(r.hasPee) arr.push(txtPee);
                        if(r.hasPoo) { let p = txtPoo; if(r.pooColor !== 'none') p += `(${r.pooColor}, ${r.pooAmount})`; arr.push(p); }
                        if(arr.length===0) arr.push(txtNoPoo); desc = arr.join(' / ');
                    } 
                    else if (r.category === 'sleep') {
                        icon = '💤'; desc = (r.sleepStatus === 'start_sleep') ? translations[currentLang].sleepStart : translations[currentLang].sleepEnd;
                    }
                    else if (r.category === 'growth') {
                        icon = '📏'; let arr = [];
                        if (r.height) arr.push(`${translations[currentLang].lblHeight}: ${r.height}cm`);
                        if (r.weight) arr.push(`${translations[currentLang].lblWeight}: ${r.weight}kg`);
                        desc = arr.join(', ');
                        h = '--'; m = '--'; 
                    }

                    listHtml = `
                        <div class="history-item">
                            <div class="history-info">
                                <div class="history-time"><span style="font-size:0.8rem; color:#888;">${displayDate}</span> ${h}:${m} ${icon}</div>
                                <div class="history-detail">${desc}</div>
                            </div>
                            <button class="delete-btn" onclick="deleteRecord('${r.id}')">Del</button>
                        </div>` + listHtml;
                }
            });

            if(isLogTab) {
                if(listHtml === '') listDiv.innerHTML = `<div style="text-align:center; color: var(--text-muted); padding: 20px;">${translations[currentLang].emptyHistory}</div>`;
                else listDiv.innerHTML = listHtml; 
                document.getElementById('sum-milk-val').innerText = dayTotalFed;
                document.getElementById('sum-pump-val').innerText = dayTotalPump;
                document.getElementById('sum-diaper-val').innerText = dayDiaperCount;
                document.getElementById('sum-sleep-val').innerText = (daySleepMins / 60).toFixed(1);
            }

            if(isHistoryTab) {
                let lblL = translations[currentLang].lblLeft;
                let lblR = translations[currentLang].lblRight;

                renderStackedBarChart('milkChart', labels, Object.values(dailyStats).map(d => d.formula), Object.values(dailyStats).map(d => d.breastmilk), 
                                      translations[currentLang].lblFormula, translations[currentLang].lblBreast, '#2196F3', '#4CAF50', translations[currentLang].lblMilkMl);
                
                renderStackedBarChart('directChart', labels, Object.values(dailyStats).map(d => d.directLeft), Object.values(dailyStats).map(d => d.directRight), 
                                      lblL, lblR, '#FF9800', '#FFB74D', translations[currentLang].lblTimeMin);
                
                renderStackedBarChart('pumpChart', labels, Object.values(dailyStats).map(d => d.pumpLeft), Object.values(dailyStats).map(d => d.pumpRight), 
                                      lblL, lblR, '#E91E63', '#F06292', translations[currentLang].lblMilkMl);

                renderSingleBarChart('sleepChart', 'sleep', labels, Object.values(dailyStats).map(d => (d.sleepMins/60).toFixed(1)), '#673AB7', translations[currentLang].lblHours);
                renderSingleBarChart('diaperChart', 'diaper', labels, Object.values(dailyStats).map(d => d.diaper), '#FF9800', translations[currentLang].unitTimes);
                
                renderLineChart('weightChart', 'weight', labels, Object.values(dailyStats).map(d => d.weight), '#9C27B0', 'kg');
                renderLineChart('heightChart', 'height', labels, Object.values(dailyStats).map(d => d.height), '#00BCD4', 'cm');
            }

        } catch(e) { console.error(e); if(isLogTab) listDiv.innerHTML = "Error loading"; }
    }

    async function exportCSV() {
        if(!db || !auth.currentUser) return alert("Please Login!");
        try {
            const snap = await db.collection("baby_records").where("userId", "==", auth.currentUser.uid).get();
            let csv = '\uFEFF'; 
            csv += (currentLang === 'zh' ? "日期,時間,寶寶名稱,紀錄類別,紀錄內容\n" : "Date,Time,Baby Name,Category,Details\n");
            
            let records = [];
            snap.forEach(doc => {
                let d = doc.data(); d.time = (d.recordTime && d.recordTime.toDate) ? d.recordTime.toDate() : new Date(d.recordTime); records.push(d);
            });
            records.sort((a,b) => b.time - a.time);

            records.forEach(r => {
                let dateStr = `${r.time.getFullYear()}/${String(r.time.getMonth()+1).padStart(2,'0')}/${String(r.time.getDate()).padStart(2,'0')}`;
                let timeStr = r.category==='growth' ? "--:--" : `${String(r.time.getHours()).padStart(2,'0')}:${String(r.time.getMinutes()).padStart(2,'0')}`;
                let cat = r.category === 'feeding' ? (currentLang==='zh'?'吃奶':'Feeding') : 
                          (r.category === 'diaper' ? (currentLang==='zh'?'換尿片':'Diaper') : 
                          (r.category === 'sleep' ? (currentLang==='zh'?'睡眠':'Sleep') : (currentLang==='zh'?'成長紀錄':'Growth')));
                let detail = "";
                let lblL = translations[currentLang].lblL; let lblR = translations[currentLang].lblR;
                
                if(r.category === 'feeding') {
                    if(r.feedingType === 'direct') {
                        let l = r.directLeft||0; let r_v = r.directRight||0; if(!l && !r_v && r.durationMins) l = r.durationMins;
                        detail = `${translations[currentLang].lblDirect} ${lblL}:${l} ${lblR}:${r_v}`;
                    } else if(r.feedingType === 'pump') {
                        let l = r.pumpLeft||0; let r_v = r.pumpRight||0; if(!l && !r_v && r.volumeML) l = r.volumeML;
                        detail = `${translations[currentLang].lblPump} ${lblL}:${l}ml ${lblR}:${r_v}ml`;
                    } else {
                        let t = r.feedingType==='formula'?translations[currentLang].lblFormula:translations[currentLang].lblBreast;
                        detail = `${t} ${r.volumeML}ml ${r.brand && r.brand!=='未填寫'?r.brand:''}`;
                    }
                } else if(r.category === 'diaper') {
                    detail = `${r.hasPee?(currentLang==='zh'?'有小便':'Pee'):''} ${r.hasPoo?(currentLang==='zh'?'有大便':'Poo'):''} ${r.pooColor&&r.pooColor!=='none'?'('+r.pooColor+')':''} ${r.pooAmount&&r.pooAmount!=='none'?'('+r.pooAmount+')':''}`;
                } else if(r.category === 'sleep') {
                    detail = r.sleepStatus === 'start_sleep' ? translations[currentLang].sleepStart : translations[currentLang].sleepEnd;
                } else if(r.category === 'growth') {
                    let hStr = r.height ? (currentLang==='zh'?'身高:':'H:') + r.height + 'cm' : '';
                    let wStr = r.weight ? (currentLang==='zh'?'體重:':'W:') + r.weight + 'kg' : '';
                    detail = `${hStr} ${wStr}`.trim();
                }
                csv += `${dateStr},${timeStr},${r.babyName || ''},${cat},"${detail.trim()}"\n`;
            });

            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url); link.setAttribute("download", currentLang==='zh'?"寶寶完整紀錄.csv":"Baby_Records.csv");
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        } catch(e) { alert("Error: " + e.message); }
    }

    function renderStackedBarChart(canvasId, labels, data1, data2, label1, label2, color1, color2, yTitle) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        if(historyCharts[canvasId]) historyCharts[canvasId].destroy();
        let isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        let textColor = isDark ? '#aaaaaa' : '#666666'; let gridColor = isDark ? '#444444' : '#eeeeee';

        historyCharts[canvasId] = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: label1, data: data1, backgroundColor: color1, stack: 'Stack 0' },
                    { label: label2, data: data2, backgroundColor: color2, stack: 'Stack 0' }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: true, labels: { color: textColor } } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: textColor, maxTicksLimit: 15 } },
                    y: { type: 'linear', display: true, position: 'left', title: { display: true, text: yTitle, color: textColor }, grid: { color: gridColor }, ticks: { color: textColor } }
                }
            }
        });
    }

    function renderSingleBarChart(canvasId, chartKey, labels, data, color, yTitle) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        if(historyCharts[chartKey]) historyCharts[chartKey].destroy();
        let isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        let textColor = isDark ? '#aaaaaa' : '#666666'; let gridColor = isDark ? '#444444' : '#eeeeee';

        historyCharts[chartKey] = new Chart(ctx, {
            type: 'bar',
            data: { labels: labels, datasets: [{ data: data, backgroundColor: color, borderRadius: 4 }] },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: textColor, maxTicksLimit: 15 } },
                    y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: textColor }, title: { display: true, text: yTitle, color: textColor } }
                }
            }
        });
    }

    function renderLineChart(canvasId, chartKey, labels, data, color, yTitle) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        if(historyCharts[chartKey]) historyCharts[chartKey].destroy();
        let isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        let textColor = isDark ? '#aaaaaa' : '#666666'; let gridColor = isDark ? '#444444' : '#eeeeee';

        historyCharts[chartKey] = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: labels, 
                datasets: [{ 
                    data: data, borderColor: color, backgroundColor: color + '33', 
                    borderWidth: 2, pointBackgroundColor: color, pointRadius: 4, 
                    fill: true, spanGaps: true
                }] 
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: textColor, maxTicksLimit: 15 } },
                    y: { beginAtZero: false, grid: { color: gridColor }, ticks: { color: textColor }, title: { display: true, text: yTitle, color: textColor } }
                }
            }
        });
    }

    async function deleteRecord(docId) { if(confirm(translations[currentLang].deleteConfirm)) { try { await db.collection("baby_records").doc(docId).delete(); loadDashboardData(); } catch(e) { alert("Error: " + e.message); } } }

    window.onload = function() {
        initTheme(); updateLanguage(); 
        setLocalDate('growth-date');
        setTime('feeding', 0, document.querySelector('#feeding-card .btn-group button')); 
        setTime('diaper', 0, document.querySelector('#diaper-card .btn-group button')); 
        setTime('sleep', 0, document.querySelector('#sleep-card .btn-group button'));
        restoreLastBrand(); if(window.innerWidth <= 850) document.getElementById('desktop-title').style.display = 'none';
    };

<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶寶成長紀錄專業版</title>
    <style>
        :root {
            --bg-color: #f4f7f6; --sidebar-bg: #ffffff; --card-bg: #ffffff; --text-color: #333333;
            --text-muted: #666666; --border-color: #e0e0e0; --btn-bg: #f9f9f9; --theme-color: #2196F3; 
            --theme-light: rgba(33, 150, 243, 0.1);
        }
        [data-theme="dark"] {
            --bg-color: #121212; --sidebar-bg: #1e1e1e; --card-bg: #242424; --text-color: #e0e0e0;
            --text-muted: #aaaaaa; --border-color: #444444; --btn-bg: #2c2c2c;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; height: 100dvh; overflow: hidden; transition: 0.3s; }
        
        /* 登入遮罩 */
        #auth-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--bg-color); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card-bg); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 6px solid var(--theme-color); }
        .auth-input { width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 10px; font-size: 1rem; box-sizing: border-box; background: var(--btn-bg); color: var(--text-color); margin-bottom: 12px; }
        .auth-btn { width: 100%; padding: 12px; background: var(--theme-color); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 12px; width: 100%; }

        /* 佈局 */
        .mobile-header { display: none; background-color: var(--sidebar-bg); padding: 10px 15px; border-bottom: 1px solid var(--border-color); align-items: center; justify-content: space-between; z-index: 100; position: sticky; top: 0; }
        .sidebar { width: 230px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; transition: transform 0.3s ease; z-index: 1000; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; }
        
        .nav-btn { width: 100%; padding: 12px 15px; border: 2px solid transparent; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; background: var(--btn-bg); color: var(--text-muted); margin-bottom: 10px; text-align: left; }
        .nav-btn.active { background: var(--theme-light); color: var(--theme-color); border-color: var(--theme-color); }
        
        .main-content { flex: 1; padding: 15px 20px 40px; box-sizing: border-box; display: flex; flex-direction: column; overflow-y: auto; }
        .baby-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .baby-tab { padding: 8px 18px; border-radius: 15px; background: var(--btn-bg); color: var(--text-muted); font-size: 1rem; font-weight: bold; cursor: pointer; border: 2px solid var(--border-color); }
        .baby-tab.active { background: var(--theme-color); color: white; border-color: var(--theme-color); }
        
        /* 卡片顯示邏輯 */
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 5px solid var(--theme-color); display: none; flex-direction: column; margin-bottom: 20px; }
        .card.active { display: flex !important; }

        .btn-group { display: grid; gap: 8px; }
        .btn { padding: 10px; border: 2px solid var(--border-color); border-radius: 10px; background: var(--btn-bg); cursor: pointer; font-size: 1rem; color: var(--text-color); font-weight: bold; }
        .btn.active { background: var(--theme-color); color: white; border-color: var(--theme-color); }
        .input-number, .input-date { width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 10px; font-size: 1rem; box-sizing: border-box; background: var(--btn-bg); color: var(--text-color); }
        .submit-btn { width: 100%; padding: 15px; background: var(--theme-color); color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 15px; }

        .chart-container { position: relative; height: 180px; width: 100%; margin: 10px 0 25px 0; }
        .history-item { background: var(--btn-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .delete-btn { color: #d32f2f; background: none; border: 1px solid #ffcccc; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        @media (max-width: 850px) {
            .mobile-header { display: flex; }
            .sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.show { display: block; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2>👶 寶寶紀錄登入</h2>
        <div id="auth-error-msg" style="color:red; margin-bottom:10px; font-size:0.9rem"></div>
        <input type="email" id="auth-email" class="auth-input" placeholder="Email">
        <input type="password" id="auth-password" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="loginUser()">登入</button>
        <button class="auth-btn" style="background:#888" onclick="registerUser()">註冊</button>
        <button class="auth-btn" style="background:#fff; color:#444; border:1px solid #ccc" onclick="loginWithGoogle()">Google 登入</button>
    </div>
</div>

<div class="mobile-header">
    <button onclick="toggleSidebar()" style="background:none; border:none; font-size:1.5rem">☰</button>
    <b>寶寶紀錄</b>
    <div style="width:30px"></div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <h3 style="text-align:center">👶 寶寶紀錄</h3>
    <div id="user-info" style="font-size:0.8rem; text-align:center; margin-bottom:15px; color:var(--text-muted)"></div>
    <button class="nav-btn active" id="btn-feeding" onclick="switchTab('feeding', this, '#2196F3')">🍼 吃奶紀錄</button>
    <button class="nav-btn" id="btn-diaper" onclick="switchTab('diaper', this, '#FF9800')">🧻 尿片紀錄</button>
    <button class="nav-btn" id="btn-sleep" onclick="switchTab('sleep', this, '#673AB7')">💤 睡眠紀錄</button>
    <button class="nav-btn" id="btn-history" onclick="switchTab('history', this, '#4CAF50')">📊 統計分析</button>
    
    <div style="margin-top:auto">
        <button class="nav-btn" onclick="toggleTheme()">☀️ 切換模式</button>
        <button class="nav-btn" style="color:red" onclick="logoutUser()">🚪 登出</button>
    </div>
</div>

<div class="main-content">
    <div class="baby-selector">
        <button class="baby-tab active" id="tab-baby1" onclick="switchBaby('baby1')">大寶</button>
        <button class="baby-tab" id="tab-baby2" onclick="switchBaby('baby2')">二寶</button>
    </div>

    <div id="feeding-card" class="card active">
        <h2>🍼 吃奶 <span id="time-feeding" style="color:var(--theme-color)">--:--</span></h2>
        <div class="btn-group" style="grid-template-columns: repeat(3, 1fr); margin-bottom:15px;">
            <button class="btn active" onclick="setTime('feeding', 0, this)">現在</button>
            <button class="btn" onclick="setTime('feeding', 15, this)">-15m</button>
            <button class="btn" onclick="setTime('feeding', 30, this)">-30m</button>
        </div>
        <label style="display:block; margin-bottom:8px; font-weight:bold">奶量 (ml)</label>
        <input type="number" id="milk-val" class="input-number" placeholder="輸入 ml 數字">
        <button class="submit-btn" onclick="submitData('feeding')">儲存吃奶紀錄</button>
    </div>

    <div id="diaper-card" class="card">
        <h2>🧻 尿片 <span id="time-diaper" style="color:var(--theme-color)">--:--</span></h2>
        <div class="btn-group" style="grid-template-columns: 1fr 1fr; margin-bottom:15px;">
            <button class="btn pee-btn" onclick="this.classList.toggle('active')">小便 💦</button>
            <button class="btn poo-btn" onclick="this.classList.toggle('active')">大便 💩</button>
        </div>
        <button class="submit-btn" onclick="submitData('diaper')">儲存尿片紀錄</button>
    </div>

    <div id="sleep-card" class="card">
        <h2>💤 睡眠 <span id="time-sleep" style="color:var(--theme-color)">--:--</span></h2>
        <div class="btn-group" id="sleep-type-group" style="grid-template-columns: 1fr 1fr; margin-bottom:15px;">
            <button class="btn active" data-val="start_sleep" onclick="selectSleep(this)">開始睡眠 🌙</button>
            <button class="btn" data-val="end_sleep" onclick="selectSleep(this)">結束睡眠 ☀️</button>
        </div>
        <button class="submit-btn" onclick="submitData('sleep')">儲存睡眠狀態</button>
    </div>

    <div id="history-card" class="card">
        <h2>📊 趨勢分析
            <select id="stats-range" class="input-date" style="width:auto" onchange="loadHistory()">
                <option value="7">最近 7 天</option>
                <option value="14">最近 14 天</option>
                <option value="30">最近 30 天</option>
            </select>
        </h2>
        <div>
            <label style="font-weight:bold">🍼 每日總奶量 (ml)</label>
            <div class="chart-container"><canvas id="milkChart"></canvas></div>
            <label style="font-weight:bold">💤 每日睡眠總時數 (小時)</label>
            <div class="chart-container"><canvas id="sleepChart"></canvas></div>
            <label style="font-weight:bold">🧻 每日換片次數</label>
            <div class="chart-container"><canvas id="diaperChart"></canvas></div>
        </div>
        <h3 style="border-top:1px solid var(--border-color); padding-top:15px">📝 歷史紀錄</h3>
        <input type="date" id="history-date" class="input-date" style="margin-bottom:10px" onchange="loadHistory()">
        <div id="history-list"></div>
    </div>
</div>

<script>
    // ==========================================
    // 🚨 請務必填寫你的真實 Firebase Config 🚨
    // ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyBAExf2aDgBP8UrCMKlpB4C8US-fCuf4Xg",
  authDomain: "babytrackerweb-c6a26.firebaseapp.com",
  projectId: "babytrackerweb-c6a26",
  storageBucket: "babytrackerweb-c6a26.firebasestorage.app",
  messagingSenderId: "297032381661",
  appId: "1:297032381661:web:a583efe8c9abb1f68dd734",
  measurementId: "G-YRLJW2P55F"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    let currentBabyId = 'baby1';
    let recordTimes = { feeding: new Date(), diaper: new Date(), sleep: new Date() };
    let charts = {};

    // 登入狀態監控
    auth.onAuthStateChanged(user => {
        const overlay = document.getElementById('auth-overlay');
        if (user) {
            overlay.style.display = 'none';
            document.getElementById('user-info').innerText = user.email;
            document.getElementById('history-date').valueAsDate = new Date();
            // 登入後確保顯示第一個分頁
            switchTab('feeding', document.getElementById('btn-feeding'), '#2196F3');
            loadHistory();
        } else {
            overlay.style.display = 'flex';
        }
    });

    function loginUser() { auth.signInWithEmailAndPassword(document.getElementById('auth-email').value, document.getElementById('auth-password').value).catch(e => { document.getElementById('auth-error-msg').innerText = e.message; }); }
    function registerUser() { auth.createUserWithEmailAndPassword(document.getElementById('auth-email').value, document.getElementById('auth-password').value).catch(e => { document.getElementById('auth-error-msg').innerText = e.message; }); }
    function loginWithGoogle() { auth.signInWithPopup(googleProvider); }
    function logoutUser() { auth.signOut(); }

    // UI 切換邏輯 (修正過的)
    function toggleSidebar() { 
        document.getElementById('sidebar').classList.toggle('open'); 
        document.getElementById('sidebar-overlay').classList.toggle('show');
    }

    function switchTab(tabId, btn, color) {
        // 1. 切換按鈕樣式
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 2. 切換卡片顯示 (核心修正：先隱藏所有再顯示目標)
        document.querySelectorAll('.card').forEach(c => {
            c.classList.remove('active');
            c.style.display = 'none'; 
        });
        const target = document.getElementById(tabId + '-card');
        target.classList.add('active');
        target.style.display = 'flex';

        // 3. 切換主題色
        document.documentElement.style.setProperty('--theme-color', color);
        
        if (tabId === 'history') loadHistory();
        if (window.innerWidth <= 850 && document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
    }

    function switchBaby(id) {
        currentBabyId = id;
        document.querySelectorAll('.baby-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+id).classList.add('active');
        loadHistory();
    }

    function toggleTheme() {
        const root = document.documentElement;
        const current = root.getAttribute('data-theme');
        root.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        loadHistory(); 
    }

    function setTime(cat, mins, btn) {
        const t = new Date(); t.setMinutes(t.getMinutes() - mins);
        recordTimes[cat] = t;
        const h = String(t.getHours()).padStart(2,'0'), m = String(t.getMinutes()).padStart(2,'0');
        document.getElementById('time-'+cat).innerText = `${h}:${m}`;
        btn.parentElement.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function selectSleep(btn) {
        document.querySelectorAll('#sleep-type-group .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // 資料存取
    async function submitData(cat) {
        if(!auth.currentUser) return;
        const submitBtn = event.target;
        submitBtn.disabled = true;
        submitBtn.innerText = "儲存中...";

        let data = {
            userId: auth.currentUser.uid,
            babyId: currentBabyId,
            category: cat,
            recordTime: recordTimes[cat],
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(cat === 'feeding') data.volumeML = Number(document.getElementById('milk-val').value) || 0;
        if(cat === 'diaper') {
            data.hasPee = document.querySelector('.pee-btn').classList.contains('active');
            data.hasPoo = document.querySelector('.poo-btn').classList.contains('active');
        }
        if(cat === 'sleep') data.sleepStatus = document.querySelector('#sleep-type-group .btn.active').getAttribute('data-val');

        try {
            await db.collection("baby_records").add(data);
            alert("成功儲存！");
            if(cat === 'feeding') document.getElementById('milk-val').value = '';
            loadHistory();
        } catch(e) {
            alert("錯誤: " + e.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "儲存紀錄";
        }
    }

    async function loadHistory() {
        if(!auth.currentUser) return;
        const range = parseInt(document.getElementById('stats-range').value);
        const selectedDate = document.getElementById('history-date').value;
        
        let labels = [];
        let dailyStats = {};
        for(let i=range-1; i>=0; i--) {
            let d = new Date(); d.setDate(d.getDate() - i);
            let k = d.toISOString().split('T')[0];
            labels.push(k.slice(5));
            dailyStats[k] = { milk: 0, diaper: 0, sleepMinutes: 0 };
        }

        const snapshot = await db.collection("baby_records")
            .where("userId", "==", auth.currentUser.uid)
            .where("babyId", "==", currentBabyId)
            .get();

        let listHtml = "";
        let allRecords = [];
        snapshot.forEach(doc => {
            let d = doc.data(); d.id = doc.id;
            d.time = d.recordTime.toDate();
            allRecords.push(d);
        });

        // 睡眠計算：排序並配對
        allRecords.sort((a, b) => a.time - b.time);
        let lastSleepStart = null;
        allRecords.forEach(r => {
            let k = r.time.toISOString().split('T')[0];
            
            if(r.category === 'sleep') {
                if(r.sleepStatus === 'start_sleep') lastSleepStart = r.time;
                else if(r.sleepStatus === 'end_sleep' && lastSleepStart) {
                    let diff = (r.time - lastSleepStart) / 1000 / 60;
                    if(dailyStats[k]) dailyStats[k].sleepMinutes += diff;
                    lastSleepStart = null;
                }
            }
            if(dailyStats[k]) {
                if(r.category === 'feeding') dailyStats[k].milk += (r.volumeML || 0);
                if(r.category === 'diaper') dailyStats[k].diaper += 1;
            }

            if(k === selectedDate) {
                let icon = r.category==='feeding'?'🍼':(r.category==='diaper'?'🧻':'💤');
                let detail = r.category==='feeding'? `${r.volumeML}ml` : (r.category==='sleep'?(r.sleepStatus==='start_sleep'?'睡覺':'醒來'):'換片');
                listHtml += `<div class="history-item">
                    <div><b>${String(r.time.getHours()).padStart(2,'0')}:${String(r.time.getMinutes()).padStart(2,'0')}</b> ${icon} ${detail}</div>
                    <button class="delete-btn" onclick="deleteRec('${r.id}')">刪除</button>
                </div>`;
            }
        });

        document.getElementById('history-list').innerHTML = listHtml || "<p style='text-align:center;color:#888'>本日無紀錄</p>";

        renderChart('milkChart', 'milk', labels, Object.values(dailyStats).map(d => d.milk), '#2196F3');
        renderChart('sleepChart', 'sleep', labels, Object.values(dailyStats).map(d => (d.sleepMinutes/60).toFixed(1)), '#673AB7');
        renderChart('diaperChart', 'diaper', labels, Object.values(dailyStats).map(d => d.diaper), '#FF9800');
    }

    function renderChart(id, key, labels, data, color) {
        const ctx = document.getElementById(id).getContext('2d');
        if(charts[key]) charts[key].destroy();
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        
        charts[key] = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{ data: data, backgroundColor: color, borderRadius: 5 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { color: isDark?'#444':'#eee' }, ticks: { color: isDark?'#aaa':'#666'} },
                    x: { grid: { display: false }, ticks: { color: isDark?'#aaa':'#666'} }
                }
            }
        });
    }

    async function deleteRec(id) { if(confirm("確定刪除此紀錄？")) { await db.collection("baby_records").doc(id).delete(); loadHistory(); } }

    // 初始化時鐘
    setInterval(() => {
        ['feeding','diaper','sleep'].forEach(cat => {
            // 這裡可以加入自動更新時間邏輯，目前我們先手動點選「現在」來更新
        });
    }, 60000);

    // 啟動時設定初始時間
    window.onload = () => {
        setTime('feeding', 0, document.querySelector('#feeding-card .btn'));
        setTime('diaper', 0, document.querySelector('#diaper-card .btn'));
        setTime('sleep', 0, document.querySelector('#sleep-card .btn'));
    };
</script>

</body>
</html>
